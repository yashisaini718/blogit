{% extends "layout.html" %}
{% block content %}

<div class="error-wrapper">
    <div class="error-card">
        <div class="error-icon">🚫</div>
        <div class="error-code">403</div>
        <h1 class="error-title">Access Denied</h1>
        <p class="error-message">
            You don't have permission to view this page.
            If you think this is a mistake, try logging in with the right account.
        </p>
        <div class="error-actions">
            <a href="{{ url_for('main.home') }}" class="error-btn-primary">Go to Home</a>
            {% if not current_user.is_authenticated %}
            <a href="{{ url_for('users.login') }}" class="error-btn-secondary">Sign In</a>
            {% endif %}
        </div>
    </div>

    <div class="error-illustration">
        <div class="error-illustration-circle error-circle-1"></div>
        <div class="error-illustration-circle error-circle-2"></div>
        <div class="error-illustration-circle error-circle-3"></div>
    </div>
</div>

{% endblock content %}
